on: [push]

env:
  RELEASE_START: 213
  CCACHE_DIR: $RUNNER_TEMP/ccache

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    container: ayufan/rock64-dockerfiles:bookworm
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Configure version
      run: echo "RELEASE=$(($RELEASE_START+$GITHUB_RUN_NUMBER))" >> $GITHUB_ENV
    - name: Configure release name
      run: echo "RELEASE_NAME=$(make version)" >> $GITHUB_ENV
    - name: Cleanup old packages
      run: rm -f *.deb
    - name: Build packages
      run: make all
    - name: Release package
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.RELEASE_NAME }}
        name: ${{ env.RELEASE_NAME }}
        body: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        target_commitish: ${{ github.sha }}
        files: "*.deb"
